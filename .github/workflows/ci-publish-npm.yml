# ci-publish-npm.yml
# ---
# self-use: publishes this package to npm when a version tag is pushed.
# triggered by tags created by the bump-version workflow.
#
# required secrets:
#   NPM_TOKEN  — npm registry publish token
#   GH_TOKEN   — github token for creating releases
# ---

name: publish-npm
run-name: "publish-npm — ${{ github.ref_name }}"

on:
  push:
    tags: ["just-github-actions-n-workflows@*"]
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to publish (e.g. "just-github-actions-n-workflows@1.2.3")'
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag and version metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG##*@}"

          if echo "$VERSION" | grep -qiE '(canary|alpha|beta|rc)'; then
            echo "npm_tag=canary" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout repo at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0
          lfs: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.meta.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build step binaries (for release notes)
        run: bun run build

      - name: Generate release notes
        id: release_notes
        timeout-minutes: 1
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          ROOT_DIR: ${{ github.workspace }}
        run: ./dist/generate-release-notes

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.is_prerelease == 'true' }}
          body: |
            ## Release Notes

            ${{ steps.release_notes.outputs.release_notes }}

            ## Install

            ```sh
            npm install just-github-actions-n-workflows@${{ steps.meta.outputs.version }}
            # or
            bunx just-github-actions-n-workflows init
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

