# publish-npm-on-tag.yml
# ---
# reusable workflow: publishes a package to npm and creates a github
# release with auto-generated release notes.
#
# usage (in your repo's `.github/workflows/publish-npm.yml`):
#
#   name: publish-npm
#   on:
#     push:
#       tags: ["*@*"]
#     workflow_dispatch:
#       inputs:
#         tag: { description: 'tag to publish', required: false }
#
#   jobs:
#     publish:
#       uses: justAnArthur/just-github-actions-n-workflows/.github/workflows/publish-npm-on-tag.yml@main
#       with:
#         tag: ${{ github.event.inputs.tag || github.ref_name }}
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
#         NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
# ---

name: publish-npm-on-tag

on:
  workflow_call:
    inputs:
      tag:
        description: 'tag to publish (e.g. "my-package@1.2.3")'
        type: string
        required: true
    secrets:
      GH_TOKEN:
        description: "github token with contents:write"
        required: true
      NPM_TOKEN:
        description: "npm registry publish token"
        required: true

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag and version metadata
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          VERSION="${TAG##*@}"

          if echo "$VERSION" | grep -qiE '(canary|alpha|beta|rc)'; then
            echo "npm_tag=canary" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      # --- checkout the caller's repo ---
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          lfs: true

      # --- fetch toolkit binaries from this repo ---
      - name: Fetch toolkit binaries
        uses: actions/checkout@v4
        with:
          repository: justAnArthur/just-github-actions-n-workflows
          path: .toolkit
          sparse-checkout: dist

      - name: Install binaries
        run: |
          cp -r .toolkit/dist ./dist
          chmod +x dist/*
          rm -rf .toolkit

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (if build script exists)
        run: |
          if bun run --silent build 2>/dev/null; then
            echo "build completed"
          else
            echo "no build script or build skipped"
          fi

      - name: Publish to npm
        run: npm publish --access public --tag ${{ steps.meta.outputs.npm_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Fetch all tags
        run: ./dist/fetch-tags

      - name: Generate release notes
        id: release_notes
        timeout-minutes: 1
        env:
          TAG_NAME: ${{ steps.meta.outputs.tag }}
          ROOT_DIR: ${{ github.workspace }}
        run: ./dist/generate-release-notes

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.is_prerelease == 'true' }}
          body: |
            ## Release Notes

            ${{ steps.release_notes.outputs.release_notes }}

            ## Install

            ```sh
            npm install $(echo "${{ steps.meta.outputs.tag }}" | sed 's/@[^@]*$//')@${{ steps.meta.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

