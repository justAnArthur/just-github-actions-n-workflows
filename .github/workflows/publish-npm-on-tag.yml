# publish-npm-on-tag.yml
# ---
# publishes a package to npm and creates a github release when a
# version tag is pushed (e.g. "my-package@1.2.3").
#
# copy this file into your repo's `.github/workflows/` and adjust
# the `push.tags` pattern to match your package naming convention.
#
# can also be called as a reusable workflow:
#
#   jobs:
#     publish:
#       uses: justAnArthur/just-github-actions-n-workflows/.github/workflows/publish-npm-on-tag.yml@main
#       with:
#         tag: ${{ github.ref_name }}
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
#         NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
#
# required secrets:
#   GH_TOKEN  — github token with contents:write
#   NPM_TOKEN — npm registry publish token
# ---

name: publish-npm-on-tag
run-name: "publish-npm — ${{ inputs.tag || github.ref_name }}"

on:
  push:
    tags: [ "*@*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to publish (e.g. "my-package@1.2.3")'
        type: string
        required: true
  workflow_call:
    inputs:
      tag:
        description: 'tag to publish (e.g. "my-package@1.2.3")'
        type: string
        required: true
    secrets:
      GH_TOKEN:
        description: "github token with contents:write"
        required: true
      NPM_TOKEN:
        description: "npm registry publish token"
        required: true

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest

    steps:
      - name: Determine tag and version metadata
        id: meta
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG##*@}"

          if echo "$VERSION" | grep -qiE '(canary|alpha|beta|rc)'; then
            echo "npm_tag=canary" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "npm_tag=latest" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          lfs: true

      - name: Resolve package directory
        id: pkg
        uses: justAnArthur/just-github-actions-n-workflows/actions/resolve-package-dir@main
        with:
          tag_name: ${{ steps.meta.outputs.tag }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (if build script exists)
        run: |
          if bun run --silent build 2>/dev/null; then
            echo "build completed"
          else
            echo "no build script or build skipped"
          fi

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: bun publish --access public --tag ${{ steps.meta.outputs.npm_tag }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Fetch all tags
        uses: justAnArthur/just-github-actions-n-workflows/actions/fetch-tags@main

      - name: Generate release notes
        id: release_notes
        uses: justAnArthur/just-github-actions-n-workflows/actions/generate-release-notes@main
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          root_dir: ${{ github.workspace }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          prerelease: ${{ steps.meta.outputs.is_prerelease == 'true' }}
          body: |
            ## Release Notes

            ${{ steps.release_notes.outputs.release_notes }}

            ## Install

            ```sh
            npm install $(echo "${{ steps.meta.outputs.tag }}" | sed 's/@[^@]*$//')@${{ steps.meta.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
