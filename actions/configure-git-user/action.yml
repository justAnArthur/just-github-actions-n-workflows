name: Setup Git Author
description: >
  Configures git user.name and user.email for subsequent commits.
  In "push" mode, extracts the author from the last commit.
  In any other mode, uses the GitHub actor as the author identity.

inputs:
  mode:
    description: 'Author resolution mode — "push" extracts from last commit, anything else uses the GitHub actor'
    required: false
    default: "push"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
      working-directory: ${{ github.action_path }}/../..

    - name: Run setup-git-author
      shell: bash
      env:
        MODE: ${{ inputs.mode }}
      run: bun run ${{ github.action_path }}/src/index.ts

