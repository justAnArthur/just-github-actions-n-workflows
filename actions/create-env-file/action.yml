name: Create Dotenv
description: >
  Creates a .env file from the provided variables.
  Strips comments and blank lines, writes to the specified path.

inputs:
  variables:
    description: "Environment variables to write (one KEY=VALUE per line)"
    required: true
  file_name:
    description: "Name of the env file to create"
    required: false
    default: ".env"
  file_path:
    description: "Directory path where the env file should be created"
    required: false
    default: "./"

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
      working-directory: ${{ github.action_path }}/../..

    - name: Run create-dotenv
      shell: bash
      env:
        ENV_FILE_VARIABLES: ${{ inputs.variables }}
        ENV_FILE_NAME: ${{ inputs.file_name }}
        ENV_FILE_PATH: ${{ inputs.file_path }}
      run: bun run ${{ github.action_path }}/src/index.ts

