name: Resolve Deploy Config
description: >
  Resolves deployment configuration (compose profiles, Spring profiles, timezone,
  host) for a target environment. Reads from `.justactions.yml` settings file or
  a custom JSON override. Exports resolved values as environment variables.

inputs:
  environment:
    description: "Target deployment environment name (must match a key in .justactions.yml deploy.targets)"
    required: true
  config:
    description: "Optional JSON override for deployment configuration (keyed by environment)"
    required: false
    default: ""

outputs:
  host:
    description: "Resolved deploy host"
    value: ${{ steps.run.outputs.host }}
  compose_profiles:
    description: "Resolved compose profiles"
    value: ${{ steps.run.outputs.compose_profiles }}
  profiles:
    description: "Resolved profiles"
    value: ${{ steps.run.outputs.profiles }}
  app_tz:
    description: "Resolved timezone"
    value: ${{ steps.run.outputs.app_tz }}
  compose_file:
    description: "Resolved compose file"
    value: ${{ steps.run.outputs.compose_file }}
  ssh_target_path:
    description: "Resolved SSH target path"
    value: ${{ steps.run.outputs.ssh_target_path }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
      working-directory: ${{ github.action_path }}/../..

    - name: Run resolve-deploy-config
      id: run
      shell: bash
      env:
        DEPLOY_ENVIRONMENT: ${{ inputs.environment }}
        DEPLOY_CONFIG: ${{ inputs.config }}
      run: bun run ${{ github.action_path }}/src/index.ts
