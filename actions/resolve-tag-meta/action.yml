name: Resolve Tag Metadata
description: >
  Parses a git tag in `<package>@<version>` format and outputs
  structured metadata: package name, version, npm dist-tag,
  prerelease status, and deployment targets from the tag annotation.

inputs:
  tag:
    description: "Git tag to parse (e.g. '@scope/pkg@1.2.3-canary.0')"
    required: true

outputs:
  tag:
    description: "The raw tag (cleaned of refs/ prefixes)"
    value: ${{ steps.run.outputs.tag }}
  pkg_name:
    description: "Package name extracted from the tag"
    value: ${{ steps.run.outputs.pkg_name }}
  version:
    description: "Version extracted from the tag"
    value: ${{ steps.run.outputs.version }}
  npm_tag:
    description: "npm dist-tag: the prerelease channel (e.g. 'canary', 'beta', 'alpha', 'rc') or 'latest' for stable"
    value: ${{ steps.run.outputs.npm_tag }}
  is_prerelease:
    description: "'true' if the version contains a prerelease identifier"
    value: ${{ steps.run.outputs.is_prerelease }}
  prerelease_channel:
    description: "Prerelease channel name (e.g. 'canary', 'beta', 'alpha', 'rc') or empty for stable"
    value: ${{ steps.run.outputs.prerelease_channel }}
  deploy_targets:
    description: "JSON array of deployment targets from the tag annotation (e.g. '[\"npm\",\"docker\"]')"
    value: ${{ steps.run.outputs.deploy_targets }}
  publish_npm:
    description: "'true' if the tag annotation includes 'npm' as a deploy target"
    value: ${{ steps.run.outputs.publish_npm }}
  publish_docker:
    description: "'true' if the tag annotation includes 'docker' as a deploy target"
    value: ${{ steps.run.outputs.publish_docker }}
  publish_vercel:
    description: "'true' if the tag annotation includes 'vercel' as a deploy target"
    value: ${{ steps.run.outputs.publish_vercel }}
  has_annotation:
    description: "'true' if the tag has a valid annotation with deploy metadata"
    value: ${{ steps.run.outputs.has_annotation }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile
      working-directory: ${{ github.action_path }}/../..

    - name: Run resolve-tag-meta
      id: run
      shell: bash
      env:
        TAG: ${{ inputs.tag }}
      run: bun run ${{ github.action_path }}/src/index.ts

