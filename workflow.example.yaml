# workflow.example.yaml
# ---
# examples: how to use the reusable workflows from this toolkit.
# paste any example into your repo's `.github/workflows/` — no files
# to copy, no binaries to commit.  the toolkit fetches its own
# binaries automatically at runtime.
#
# available reusable workflows:
#   .github/workflows/bump-version.yml
#   .github/workflows/publish-docker-on-tag.yml
#   .github/workflows/publish-npm-on-tag.yml
#
# for custom workflows (e.g. deploy), you can also use the binaries
# directly — see example 4 below.
# ---

