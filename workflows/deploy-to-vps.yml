# deploy-to-vps.yml
# ---
# project-specific example: deploys docker compose services to a vps.
# this one is too specific for a reusable workflow, so it fetches the
# toolkit binaries directly and calls them in its steps.
#
# paste this into your repo's `.github/workflows/` and customise the
# environment list and compose profiles for your project.
#
# binaries used: setup-ssh, resolve-deploy-config, resolve-image-tags,
#                create-env-file, scp-transfer, ssh-exec
# ---

name: "deploy-to-vps"
run-name: "${{ format('deploy-to-vps (manual) - env={0}, backend={1}, frontend={2}, gps={3}', github.event.inputs.environment || '', github.event.inputs.backend_version || github.event.inputs.frontend_version || 'auto', github.event.inputs.frontend_version || github.event.inputs.backend_version || 'auto', github.event.inputs.gps_version || 'auto') }}"

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: Target environment to deploy to
        options:
          - test.camasys.com
          - app.camasys.com
          - camasys.autoin.cz
          - camasys.avis.fo
          - camasys.net
          - 78.47.109.42
        required: true
      backend_version:
        type: string
        description: Backend version ('1.2.3', 'stable', 'canary', or leave empty to use frontend_version)
        required: false
      frontend_version:
        type: string
        description: Frontend version ('1.2.3', 'stable', 'canary', or leave empty to use backend_version)
        required: false
      gps_version:
        type: string
        description: GPS version ('1.2.3', 'stable', 'canary', or leave empty to use backend_version)
        required: false

env:
  SSH_TARGET_PATH: '~/camasys-new'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}
          lfs: true

      # --- fetch toolkit binaries ---
      - name: Fetch toolkit binaries
        uses: actions/checkout@v4
        with:
          repository: justAnArthur/just-github-actions-n-workflows
          path: .toolkit
          sparse-checkout: dist

      - name: Install binaries
        run: |
          cp -r .toolkit/dist ./dist
          chmod +x dist/*
          rm -rf .toolkit

      - name: Set up SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ github.event.inputs.environment }}
        run: ./dist/setup-ssh

      - name: Determine compose profiles and timezone
        env:
          DEPLOY_ENVIRONMENT: ${{ github.event.inputs.environment }}
        run: ./dist/resolve-deploy-config

      - name: Validate version inputs
        run: |
          if [ -z "${{ github.event.inputs.backend_version }}" ] && [ -z "${{ github.event.inputs.frontend_version }}" ]; then
            echo "::error::At least one of backend_version or frontend_version must be specified"
            exit 1
          fi

      - name: Resolve image tags
        env:
          RESOLVE_REPO_URL: https://github.com/utegsk/camasys.git
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RESOLVE_COMPONENTS: |
            [
              { "name": "BACKEND", "package": "@camasys/backend_core", "version": "${{ github.event.inputs.backend_version || github.event.inputs.frontend_version }}" },
              { "name": "FRONTEND", "package": "@camasys/frontend_core", "version": "${{ github.event.inputs.frontend_version || github.event.inputs.backend_version }}" },
              { "name": "GPS", "package": "@camasys/backend_gps", "version": "${{ github.event.inputs.gps_version || github.event.inputs.backend_version || github.event.inputs.frontend_version }}" }
            ]
        run: ./dist/resolve-image-tags

      - name: Create .env file for Docker Compose
        env:
          ENV_FILE_VARIABLES: |
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DOCKER_BACKEND_IMAGE_TAG=${{ env.DOCKER_BACKEND_IMAGE_TAG }}
            DOCKER_FRONTEND_IMAGE_TAG=${{ env.DOCKER_FRONTEND_IMAGE_TAG }}
            DOCKER_GPS_IMAGE_TAG=${{ env.DOCKER_GPS_IMAGE_TAG }}
            COMPOSE_PROFILES=${{ env.COMPOSE_PROFILES }}
            PROFILES=${{ env.PROFILES }}
            APP_TZ=${{ env.APP_TZ }}
        run: ./dist/create-env-file

      - name: Transfer docker-compose.yml and .env files to server
        env:
          SCP_HOST: ${{ github.event.inputs.environment }}
          SCP_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SCP_SOURCE: './docker-compose.yml ./.env'
          SCP_TARGET: ${{ env.SSH_TARGET_PATH }}
        run: ./dist/scp-transfer

      - name: Rebuild Docker Compose and restart containers
        env:
          SSH_EXEC_HOST: ${{ github.event.inputs.environment }}
          SSH_EXEC_USERNAME: ${{ secrets.SERVER_USERNAME }}
          SSH_EXEC_SCRIPT: |
            set -euo pipefail
            TARGET=${{ env.SSH_TARGET_PATH }}
            echo "Changing to target directory: $TARGET"
            cd "$TARGET"

            echo "Attempting to log in to GitHub Container Registry (ghcr.io)"
            if [ -n "${{ secrets.DOCKER_PASSWORD }}" ] && [ -n "${{ secrets.DOCKER_USERNAME }}" ]; then
              echo "${{ secrets.DOCKER_PASSWORD }}" | docker login ghcr.io -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin || true
              echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin || true
            fi

            if command -v docker >/dev/null 2>&1 && docker compose version >/dev/null 2>&1; then
              DOCKER_COMPOSE_CMD="docker compose"
            else
              DOCKER_COMPOSE_CMD="docker-compose"
            fi

            echo "Using compose command: $DOCKER_COMPOSE_CMD"
            echo "Pulling images..."
            $DOCKER_COMPOSE_CMD pull --ignore-pull-failures --parallel || true

            echo "Bringing up services..."
            $DOCKER_COMPOSE_CMD up -d --remove-orphans --force-recreate

            echo "Listing running containers:"
            $DOCKER_COMPOSE_CMD ps

            echo "Cleaning up unused Docker objects..."
            docker system prune -f --volumes

            echo "Deployment finished."
        run: ./dist/ssh-exec
