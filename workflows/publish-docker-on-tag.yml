# publish-docker-on-tag.yml
# ---
# builds and publishes a docker image to ghcr, then creates a github
# release with auto-generated release notes when a version tag is pushed.
#
# automatically skips packages that don't have "docker" in their tag
# annotation's deploy targets. for legacy tags without annotations,
# falls back to the get-dockerfile-path action (exits if no Dockerfile).
#
# copy this file into your repo's `.github/workflows/` and adjust
# the `push.tags` pattern to match your package naming convention.
#
# can also be called as a reusable workflow:
#
#   jobs:
#     publish:
#       uses: justAnArthur/just-github-actions-n-workflows/.github/workflows/publish-docker-on-tag.yml@main
#       with:
#         tag: ${{ github.ref_name }}
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
#         NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
#
# required secrets:
#   GH_TOKEN  — github token with contents:write and packages:write
#   NPM_TOKEN — npm registry token (optional, passed as docker build arg)
# ---

name: publish-docker-on-tag
run-name: "publish-docker — ${{ inputs.tag || github.ref_name }}"

on:
  push:
    tags: [ "**@*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to build (e.g. "@scope/pkg@1.2.3-canary.4")'
        type: string
        required: true
  workflow_call:
    inputs:
      tag:
        description: 'tag to build (e.g. "@scope/pkg@1.2.3-canary.4")'
        type: string
        required: true
    secrets:
      GH_TOKEN:
        description: "github token with contents:write and packages:write"
        required: true
      NPM_TOKEN:
        description: "npm registry token (passed as docker build arg)"
        required: false

permissions:
  contents: write
  packages: write

jobs:
  build-and-publish-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag metadata
        id: meta
        uses: justAnArthur/just-github-actions-n-workflows/actions/resolve-tag-meta@main
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Skip if docker is not a deploy target
        if: steps.meta.outputs.has_annotation == 'true' && steps.meta.outputs.publish_docker != 'true'
        run: |
          echo "tag annotation does not include 'docker' deploy target — skipping"
          echo "SKIP_DOCKER=true" >> "$GITHUB_ENV"

      - name: Checkout repo
        if: env.SKIP_DOCKER != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          ref: ${{ steps.meta.outputs.tag || inputs.tag || github.ref_name }}
          lfs: true

      - name: Fetch all tags
        if: env.SKIP_DOCKER != 'true'
        uses: justAnArthur/just-github-actions-n-workflows/actions/fetch-tags@main

      - name: Resolve dockerfile path
        if: env.SKIP_DOCKER != 'true'
        id: dockerfile
        uses: justAnArthur/just-github-actions-n-workflows/actions/get-dockerfile-path@main
        with:
          tag_name: ${{ steps.meta.outputs.tag || inputs.tag || github.ref_name }}

      - name: Prepare image metadata
        if: env.SKIP_DOCKER != 'true'
        id: prepare
        uses: justAnArthur/just-github-actions-n-workflows/actions/prepare-docker-meta@main
        with:
          tag_name: ${{ steps.meta.outputs.tag || inputs.tag || github.ref_name }}
          dockerfile: ${{ steps.dockerfile.outputs.dockerfile }}
          context: ${{ steps.dockerfile.outputs.context }}

      - name: Log in to GitHub Container Registry
        if: env.SKIP_DOCKER != 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Build and push docker image to ghcr
        if: env.SKIP_DOCKER != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ steps.prepare.outputs.context }}
          file: ${{ steps.prepare.outputs.dockerfile }}
          push: true
          tags: ghcr.io/${{ steps.prepare.outputs.repository }}/${{ steps.prepare.outputs.package_image_name }}:${{ steps.prepare.outputs.image_tag }}
          platforms: linux/amd64
          build-args: |
            USERNAME_GITHUB=${{ github.actor }}
            TOKEN_GITHUB=${{ secrets.GH_TOKEN }}
            TAG_NAME=${{ steps.prepare.outputs.original_tag }}
            SANITIZED_IMAGE_TAG=${{ steps.prepare.outputs.image_tag }}
            NPM_TOKEN=${{ secrets.NPM_TOKEN }}
          labels: |
            org.opencontainers.image.version=${{ steps.prepare.outputs.original_tag }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Docker image for ${{ steps.prepare.outputs.package_raw }} built from tag ${{ steps.prepare.outputs.original_tag }}

      - name: Generate release notes
        if: env.SKIP_DOCKER != 'true'
        id: generate_release_notes
        uses: justAnArthur/just-github-actions-n-workflows/actions/generate-release-notes@main
        with:
          tag_name: ${{ steps.prepare.outputs.original_tag }}
          root_dir: ${{ github.workspace }}

      - name: Create GitHub release
        if: env.SKIP_DOCKER != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prepare.outputs.original_tag }}
          name: ${{ steps.prepare.outputs.original_tag }}
          prerelease: ${{ steps.prepare.outputs.is_prerelease == 'true' }}
          body: |
            ## release notes

            ${{ steps.generate_release_notes.outputs.release_notes }}

            ## docker image

            published to [github container registry](https://github.com/${{ github.repository }}/pkgs/container/${{ steps.prepare.outputs.repo_name }}%2F${{ steps.prepare.outputs.package_image_name }}?tag=${{ steps.prepare.outputs.image_tag }})
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
