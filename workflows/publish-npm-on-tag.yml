# publish-npm-on-tag.yml
# ---
# publishes a package to npm and creates a github release when a
# version tag is pushed (e.g. "my-package@1.2.3").
#
# automatically skips private packages by checking the package.json.
# in a monorepo, only packages without `"private": true` get published.
#
# copy this file into your repo's `.github/workflows/` and adjust
# the `push.tags` pattern to match your package naming convention.
#
# can also be called as a reusable workflow:
#
#   jobs:
#     publish:
#       uses: justAnArthur/just-github-actions-n-workflows/.github/workflows/publish-npm-on-tag.yml@main
#       with:
#         tag: ${{ github.ref_name }}
#       secrets:
#         GH_TOKEN: ${{ secrets.GH_TOKEN }}
#         NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
#
# required secrets:
#   GH_TOKEN  — github token with contents:write
#   NPM_TOKEN — npm registry publish token
# ---

name: publish-npm-on-tag
run-name: "publish-npm — ${{ inputs.tag || github.ref_name }}"

on:
  push:
    tags: [ "**@*" ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'tag to publish (e.g. "@scope/pkg@1.2.3")'
        type: string
        required: true
  workflow_call:
    inputs:
      tag:
        description: 'tag to publish (e.g. "@scope/pkg@1.2.3")'
        type: string
        required: true
    secrets:
      GH_TOKEN:
        description: "github token with contents:write"
        required: true
      NPM_TOKEN:
        description: "npm registry publish token"
        required: true

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.gate.outputs.skip }}
      tag: ${{ steps.meta.outputs.tag }}
      pkg_name: ${{ steps.meta.outputs.pkg_name }}
      version: ${{ steps.meta.outputs.version }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      dir: ${{ steps.pkg.outputs.dir }}

    steps:
      - name: Resolve tag metadata
        id: meta
        uses: justAnArthur/just-github-actions-n-workflows/actions/resolve-tag-meta@main
        with:
          tag: ${{ inputs.tag || github.ref_name }}

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}
          fetch-depth: 1
          token: ${{ secrets.GH_TOKEN }}

      - name: Resolve package directory
        id: pkg
        uses: justAnArthur/just-github-actions-n-workflows/actions/resolve-package-dir@main
        with:
          tag_name: ${{ steps.meta.outputs.tag }}

      - name: Check if package is publishable
        id: gate
        uses: justAnArthur/just-github-actions-n-workflows/actions/check-publishable@main
        with:
          dir: ${{ steps.pkg.outputs.dir }}

  publish-npm:
    needs: check
    if: needs.check.outputs.skip != 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.check.outputs.tag }}
          fetch-depth: 0
          token: ${{ secrets.GH_TOKEN }}
          lfs: true

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (if build script exists)
        working-directory: ${{ needs.check.outputs.dir }}
        run: |
          if bun run --silent build 2>/dev/null; then
            echo "build completed"
          else
            echo "no build script or build skipped"
          fi

      - name: Publish to npm
        working-directory: ${{ needs.check.outputs.dir }}
        run: bun publish -p --access public --tag ${{ needs.check.outputs.npm_tag }}
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Fetch all tags
        uses: justAnArthur/just-github-actions-n-workflows/actions/fetch-tags@main

      - name: Generate release notes
        id: release_notes
        uses: justAnArthur/just-github-actions-n-workflows/actions/generate-release-notes@main
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          root_dir: ${{ github.workspace }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.check.outputs.tag }}
          name: ${{ needs.check.outputs.tag }}
          prerelease: ${{ needs.check.outputs.is_prerelease == 'true' }}
          body: |
            ## Release Notes

            ${{ steps.release_notes.outputs.release_notes }}

            ## Install

            ```sh
            npm install ${{ needs.check.outputs.pkg_name }}@${{ needs.check.outputs.version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
